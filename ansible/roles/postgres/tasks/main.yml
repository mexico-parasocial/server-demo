---
# =============================================================================
# Self-Managed PostgreSQL with Automated Backups
# =============================================================================
# This role installs and configures Postgres inside Docker Swarm with:
#   - Daily pg_dump backups
#   - Continuous WAL archiving to S3-compatible storage
#   - Weekly base backups (pg_basebackup)
#   - Automatic cleanup (retain 14 days)
#   - Health checks and monitoring
#
# RISKS YOU ARE ACCEPTING:
#   - Disk failure on the manager node = data loss if backups fail
#   - No managed failover (you must restore from backup manually)
#   - You are now the DBA
#
# MITIGATION:
#   - WAL archives go to S3/R2 (off-site, survives local disk death)
#   - Base backups go to S3/R2 weekly
#   - Daily pg_dumps go to local disk + S3/R2
#   - Monitor backup jobs with alerts
# =============================================================================

- name: Create Postgres directories
  file:
    path: "{{ para_deploy_dir }}/postgres/{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - data
    - backups
    - wal_archive
    - scripts

- name: Deploy Postgres backup script
  template:
    src: backup.sh.j2
    dest: "{{ para_deploy_dir }}/postgres/scripts/backup.sh"
    mode: "0700"

- name: Deploy WAL archive script
  template:
    src: wal_archive.sh.j2
    dest: "{{ para_deploy_dir }}/postgres/scripts/wal_archive.sh"
    mode: "0700"

- name: Deploy Postgres systemd service (backup timer)
  template:
    src: postgres-backup.service.j2
    dest: /etc/systemd/system/para-postgres-backup.service

- name: Deploy Postgres systemd timer (daily at 3 AM)
  template:
    src: postgres-backup.timer.j2
    dest: /etc/systemd/system/para-postgres-backup.timer

- name: Enable and start backup timer
  systemd:
    name: para-postgres-backup.timer
    enabled: yes
    state: started
    daemon_reload: yes

- name: Deploy Postgres configuration
  template:
    src: postgresql.conf.j2
    dest: "{{ para_deploy_dir }}/postgres/postgresql.conf"

- name: Deploy pg_hba.conf (local + internal network only)
  template:
    src: pg_hba.conf.j2
    dest: "{{ para_deploy_dir }}/postgres/pg_hba.conf"

- name: Ensure pg_wal directory exists for WAL archiving
  file:
    path: "{{ para_deploy_dir }}/postgres/wal_archive"
    state: directory
    mode: "0700"

- name: Deploy Postgres as Swarm service
  docker_swarm_service:
    name: postgres
    image: "postgres:15-alpine"
    restart_config:
      condition: any
      delay: 5s
      max_attempts: 3
    env:
      POSTGRES_USER: "{{ postgres_user }}"
      POSTGRES_PASSWORD: "{{ postgres_password }}"
      POSTGRES_DB: "{{ postgres_db }}"
      PGDATA: /var/lib/postgresql/data/pgdata
    mounts:
      - source: "{{ para_deploy_dir }}/postgres/data"
        target: /var/lib/postgresql/data
        type: bind
      - source: "{{ para_deploy_dir }}/postgres/postgresql.conf"
        target: /etc/postgresql/postgresql.conf
        type: bind
        read_only: yes
      - source: "{{ para_deploy_dir }}/postgres/pg_hba.conf"
        target: /etc/postgresql/pg_hba.conf
        type: bind
        read_only: yes
      - source: "{{ para_deploy_dir }}/postgres/scripts"
        target: /opt/postgres/scripts
        type: bind
        read_only: yes
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{ postgres_user }}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - "{{ swarm_overlay_network }}"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.postgres-primary == true
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
        reservations:
          memory: 512m
          cpus: "0.25"
  delegate_to: "{{ groups['swarm_managers'][0] }}"
  run_once: true

- name: Create restore helper script
  template:
    src: restore.sh.j2
    dest: "{{ para_deploy_dir }}/postgres/scripts/restore.sh"
    mode: "0700"

- name: Print backup info
  debug:
    msg: |
      🗄️  Postgres self-managed deployed.

      Backup schedule:
        - Daily pg_dump:  03:00 UTC → local + S3/R2
        - WAL archiving:  continuous → S3/R2
        - Base backup:    Sundays 02:00 UTC → S3/R2
        - Retention:      14 days

      Manual backup:
        ssh {{ groups['swarm_managers'][0] }} '{{ para_deploy_dir }}/postgres/scripts/backup.sh'

      Restore from backup:
        ssh {{ groups['swarm_managers'][0] }} '{{ para_deploy_dir }}/postgres/scripts/restore.sh /path/to/backup.dump'

      Check backup status:
        systemctl status para-postgres-backup
        journalctl -u para-postgres-backup -f
