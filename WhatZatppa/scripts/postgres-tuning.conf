# PostgreSQL Tuning for 128GB RAM + 5950X
# Applied via docker-compose volume mount

# Connections
max_connections = 1000
superuser_reserved_connections = 10

# Memory (aggressive for 128GB)
shared_buffers = 32GB
effective_cache_size = 96GB
work_mem = 64MB
maintenance_work_mem = 2GB
wal_buffers = 64MB

# WAL / Checkpointing
checkpoint_completion_target = 0.9
max_wal_size = 8GB
min_wal_size = 2GB
checkpoint_timeout = 10min

# Query planner
random_page_cost = 1.1
effective_io_concurrency = 200

# Logging
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0

# Autovacuum (critical for high-write tables like cabildeo_vote)
autovacuum_max_workers = 8
autovacuum_naptime = 10s
