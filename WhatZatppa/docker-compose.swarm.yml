# =============================================================================
# PARA Docker Swarm Stack
# =============================================================================
# This file is used by Ansible for production deployments.
# It scales horizontally where possible and constrains stateful services.
#
# To deploy manually:
#   docker stack deploy --compose-file docker-compose.swarm.yml para
#
# To scale AppView:
#   docker service scale para_appview=4
# =============================================================================

version: '3.9'

services:
  # ==========================================================================
  # DATA LAYER (stateful — pinned to manager nodes)
  #
  # NOTE: Postgres is self-managed. Ansible deploys it with:
  #   - Custom postgresql.conf (WAL archiving, tuned for 4c/8GB)
  #   - pg_hba.conf (internal network only)
  #   - Daily automated backups (systemd timer)
  #   - WAL shipping to S3/R2 for point-in-time recovery
  #   - Restore script at /opt/para/postgres/scripts/restore.sh
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-para}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - type: bind
        source: /opt/para/postgres/data
        target: /var/lib/postgresql/data
      - type: bind
        source: /opt/para/postgres/postgresql.conf
        target: /etc/postgresql/postgresql.conf
        read_only: true
      - type: bind
        source: /opt/para/postgres/pg_hba.conf
        target: /etc/postgresql/pg_hba.conf
        read_only: true
      - type: bind
        source: /opt/para/postgres/scripts
        target: /opt/postgres/scripts
        read_only: true
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pg}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - para-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.postgres-primary == true
      resources:
        limits:
          memory: 2g
          cpus: '1.0'
        reservations:
          memory: 512m
          cpus: '0.25'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - type: volume
        source: redis_data
        target: /data
    healthcheck:
      test: ['CMD-SHELL', '[ "$$(redis-cli ping)" = "PONG" ]']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - para-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ==========================================================================
  # AT PROTOCOL SERVICES
  # ==========================================================================
  pds:
    image: para-pds:latest
    build:
      context: .
      dockerfile: ./services/pds/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PDS_PORT: 2583
      PDS_DB_POSTGRES_URL: postgres://${POSTGRES_USER:-pg}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-para}
      PDS_BLOBSTORE_S3_BUCKET: ${PDS_BLOBSTORE_S3_BUCKET}
      PDS_BLOBSTORE_S3_REGION: ${PDS_BLOBSTORE_S3_REGION:-auto}
      PDS_BLOBSTORE_S3_ENDPOINT: ${PDS_BLOBSTORE_S3_ENDPOINT}
      PDS_BLOBSTORE_S3_ACCESS_KEY_ID: ${PDS_BLOBSTORE_S3_ACCESS_KEY_ID}
      PDS_BLOBSTORE_S3_SECRET_ACCESS_KEY: ${PDS_BLOBSTORE_S3_SECRET_ACCESS_KEY}
      PDS_BLOBSTORE_S3_FORCE_PATH_STYLE: 'true'
      PDS_RATE_LIMITS_ENABLED: 'true'
      PDS_RATE_LIMIT_BYPASS_KEY: ${PDS_RATE_LIMIT_BYPASS_KEY}
      PDS_DID_PLC_URL: ${PDS_DID_PLC_URL:-https://plc.directory}
      PDS_BSKY_APP_VIEW_URL: http://appview:2584
      PDS_BSKY_APP_VIEW_DID: ${BSKY_SERVER_DID}
      PDS_CRAWLERS: ${PDS_CRAWLERS:-https://bsky.network}
      PDS_INVITE_REQUIRED: ${PDS_INVITE_REQUIRED:-1}
      PDS_DISABLE_SSRF_PROTECTION: '0'
    volumes:
      - type: volume
        source: pds_data
        target: /data/blobs
    expose:
      - '2583'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:2583/xrpc/_health']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - para-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.pds-node == true
      resources:
        limits:
          memory: ${PDS_MEMORY_LIMIT:-1g}
          cpus: ${PDS_CPU_LIMIT:-0.5}
        reservations:
          memory: 256m
          cpus: '0.1'
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s

  dataplane:
    image: para-bsky:latest
    build:
      context: .
      dockerfile: ./services/bsky/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 2585
      DB_POSTGRES_URL: postgres://${POSTGRES_USER:-pg}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-para}
    expose:
      - '2585'
    networks:
      - para-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 1g
          cpus: '0.5'

  appview:
    image: para-bsky:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 2584
      DB_POSTGRES_URL: postgres://${POSTGRES_USER:-pg}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-para}
      REDIS_URL: redis://redis:6379
      SERVER_DID: ${BSKY_SERVER_DID}
      DID_PLC_URL: ${PDS_DID_PLC_URL:-https://plc.directory}
      BSKY_APP_VIEW_DID: ${BSKY_SERVER_DID}
      MOD_SERVICE_DID: ${MOD_SERVICE_DID:-${BSKY_SERVER_DID}}
      ADMIN_PASSWORDS: ${ADMIN_PASSWORDS}
      BSKY_SERVICE_SIGNING_KEY: ${BSKY_SERVICE_SIGNING_KEY}
      DATAPLANE_URLS: http://dataplane:2585
      BSYNC_URL: http://bsync:2586
    expose:
      - '2584'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:2584/xrpc/_health']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - para-net
    deploy:
      replicas: ${APPVIEW_REPLICAS:-2}
      placement:
        constraints:
          - node.labels.appview-node == true
      resources:
        limits:
          memory: ${APPVIEW_MEMORY_LIMIT:-2g}
          cpus: ${APPVIEW_CPU_LIMIT:-1.5}
        reservations:
          memory: 512m
          cpus: '0.25'
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s

  bsync:
    image: para-bsync:latest
    build:
      context: .
      dockerfile: ./services/bsync/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 2586
      BSYNC_DB_POSTGRES_URL: postgres://${POSTGRES_USER:-pg}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-para}
      BSYNC_SERVER_DID: ${BSYNC_SERVER_DID:-${BSKY_SERVER_DID}}
      BSYNC_DB_POOL_SIZE: ${BSYNC_DB_POOL_SIZE:-10}
      BSYNC_DB_POOL_MAX_USES: ${BSYNC_DB_POOL_MAX_USES:-100}
      BSYNC_DB_POOL_IDLE_TIMEOUT_MS: ${BSYNC_DB_POOL_IDLE_TIMEOUT_MS:-30000}
    expose:
      - '2586'
    networks:
      - para-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  ozone:
    image: para-ozone:latest
    build:
      context: .
      dockerfile: ./services/ozone/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OZONE_DB_POSTGRES_URL: postgres://${POSTGRES_USER:-pg}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-para}
      OZONE_SERVER_DID: ${OZONE_SERVER_DID:-${BSKY_SERVER_DID}}
      OZONE_ADMIN_DIDS: ${ADMIN_DIDS}
      OZONE_MODERATION_PUSH_URL: http://appview:2584
      OZONE_DB_POOL_SIZE: ${OZONE_DB_POOL_SIZE:-10}
      OZONE_DB_POOL_MAX_USES: ${OZONE_DB_POOL_MAX_USES:-100}
      OZONE_DB_POOL_IDLE_TIMEOUT_MS: ${OZONE_DB_POOL_IDLE_TIMEOUT_MS:-30000}
    expose:
      - '3000'
    networks:
      - para-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.ozone-node == true
      resources:
        limits:
          memory: 1g
          cpus: '0.5'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pds_data:
    driver: local

networks:
  para-net:
    driver: overlay
    attachable: true
