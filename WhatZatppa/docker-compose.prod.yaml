# PARA Production Stack
# Spin up the full backend with: docker compose -f docker-compose.prod.yaml up -d
#
# Prerequisites:
#   1. Generate signing keys: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
#   2. Create .env from .env.example
#   3. docker compose -f docker-compose.prod.yaml up -d
#   4. docker compose -f docker-compose.prod.yaml logs -f
#
# Security notes:
#   - Postgres and Redis are NOT exposed to the host. Only services inside this
#     compose network can reach them.
#   - Backend services (PDS, AppView, Ozone) are reached through Caddy.
#   - For the 2-computer split, move Caddy to Computer A and services to Computer B.

services:
  # ==========================================================================
  # DATA LAYER (internal only — never exposed to the internet)
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: para-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-para}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/postgres-tuning.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    # NO ports exposed — only accessible inside the Docker network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pg}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: para-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    # NO ports exposed — only accessible inside the Docker network
    healthcheck:
      test: ['CMD-SHELL', '[ "$$(redis-cli ping)" = "PONG" ]']
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # AT PROTOCOL SERVICES
  # ==========================================================================
  pds:
    build:
      context: .
      dockerfile: ./services/pds/Dockerfile
    container_name: para-pds
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PDS_PORT: 2583
      PDS_DB_POSTGRES_URL: postgres://${POSTGRES_USER:-pg}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-para}
      PDS_BLOBSTORE_S3_BUCKET: ${PDS_BLOBSTORE_S3_BUCKET}
      PDS_BLOBSTORE_S3_REGION: ${PDS_BLOBSTORE_S3_REGION:-auto}
      PDS_BLOBSTORE_S3_ENDPOINT: ${PDS_BLOBSTORE_S3_ENDPOINT}
      PDS_BLOBSTORE_S3_ACCESS_KEY_ID: ${PDS_BLOBSTORE_S3_ACCESS_KEY_ID}
      PDS_BLOBSTORE_S3_SECRET_ACCESS_KEY: ${PDS_BLOBSTORE_S3_SECRET_ACCESS_KEY}
      PDS_BLOBSTORE_S3_FORCE_PATH_STYLE: 'true'
      PDS_RATE_LIMITS_ENABLED: 'true'
      PDS_RATE_LIMIT_BYPASS_KEY: ${PDS_RATE_LIMIT_BYPASS_KEY}
      PDS_DID_PLC_URL: ${PDS_DID_PLC_URL:-https://plc.directory}
      PDS_BSKY_APP_VIEW_URL: http://bsky:2584
      PDS_BSKY_APP_VIEW_DID: ${BSKY_SERVER_DID}
      PDS_CRAWLERS: ${PDS_CRAWLERS:-https://bsky.network}
      PDS_INVITE_REQUIRED: ${PDS_INVITE_REQUIRED:-1}
      PDS_DISABLE_SSRF_PROTECTION: '0'
    volumes:
      - pds_data:/data/blobs
    # Internal port only — Caddy routes public traffic here
    expose:
      - '2583'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:2583/xrpc/_health']
      interval: 10s
      timeout: 5s
      retries: 3

  dataplane:
    build:
      context: .
      dockerfile: ./services/bsky/Dockerfile
    container_name: para-dataplane
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 2585
      DB_POSTGRES_URL: postgres://${POSTGRES_USER:-pg}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-para}
    expose:
      - '2585'

  bsky:
    build:
      context: .
      dockerfile: ./services/bsky/Dockerfile
    container_name: para-bsky
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pds:
        condition: service_healthy
      dataplane:
        condition: service_started
    env_file:
      - .env
    environment:
      PORT: 2584
      DB_POSTGRES_URL: postgres://${POSTGRES_USER:-pg}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-para}
      REDIS_URL: redis://redis:6379
      SERVER_DID: ${BSKY_SERVER_DID}
      DID_PLC_URL: ${PDS_DID_PLC_URL:-https://plc.directory}
      BSKY_APP_VIEW_DID: ${BSKY_SERVER_DID}
      MOD_SERVICE_DID: ${MOD_SERVICE_DID:-${BSKY_SERVER_DID}}
      ADMIN_PASSWORDS: ${ADMIN_PASSWORDS}
      BSKY_SERVICE_SIGNING_KEY: ${BSKY_SERVICE_SIGNING_KEY}
      DATAPLANE_URLS: http://dataplane:2585
      BSYNC_URL: http://bsync:2586
    expose:
      - '2584'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:2584/xrpc/_health']
      interval: 10s
      timeout: 5s
      retries: 3

  bsync:
    build:
      context: .
      dockerfile: ./services/bsync/Dockerfile
    container_name: para-bsync
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 2586
      BSYNC_DB_POSTGRES_URL: postgres://${POSTGRES_USER:-pg}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-para}
      BSYNC_SERVER_DID: ${BSYNC_SERVER_DID:-${BSKY_SERVER_DID}}
      BSYNC_DB_POOL_SIZE: ${BSYNC_DB_POOL_SIZE:-10}
      BSYNC_DB_POOL_MAX_USES: ${BSYNC_DB_POOL_MAX_USES:-100}
      BSYNC_DB_POOL_IDLE_TIMEOUT_MS: ${BSYNC_DB_POOL_IDLE_TIMEOUT_MS:-30000}
    expose:
      - '2586'

  ozone:
    build:
      context: .
      dockerfile: ./services/ozone/Dockerfile
    container_name: para-ozone
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      OZONE_DB_POSTGRES_URL: postgres://${POSTGRES_USER:-pg}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-para}
      OZONE_SERVER_DID: ${OZONE_SERVER_DID:-${BSKY_SERVER_DID}}
      OZONE_ADMIN_DIDS: ${ADMIN_DIDS}
      OZONE_MODERATION_PUSH_URL: http://bsky:2584
      OZONE_DB_POOL_SIZE: ${OZONE_DB_POOL_SIZE:-10}
      OZONE_DB_POOL_MAX_USES: ${OZONE_DB_POOL_MAX_USES:-100}
      OZONE_DB_POOL_IDLE_TIMEOUT_MS: ${OZONE_DB_POOL_IDLE_TIMEOUT_MS:-30000}
    expose:
      - '3000'

  # ==========================================================================
  # EDGE / REVERSE PROXY (Caddy — the only public-facing service)
  # ==========================================================================
  caddy:
    image: caddy:2
    container_name: para-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./services/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      pds:
        condition: service_healthy
      bsky:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  pds_data:
  caddy_data:
  caddy_config:
