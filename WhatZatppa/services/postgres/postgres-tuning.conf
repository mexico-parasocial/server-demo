# PARA Production PostgreSQL Tuning
# Optimized for a 32GB RAM server (Computer B).
# Adjust shared_buffers and effective_cache_size if your server has different specs.
#
# Mount this file in docker-compose.prod.yaml:
#   volumes:
#     - ./services/postgres/postgres-tuning.conf:/etc/postgresql/postgresql.conf:ro
#   command: postgres -c config_file=/etc/postgresql/postgresql.conf

# =============================================================================
# MEMORY
# =============================================================================

# 25% of total RAM. For 32GB server, set to 8GB.
# If you have 64GB, set to 16GB. If 16GB, set to 4GB.
shared_buffers = 8GB

# 75% of total RAM. PostgreSQL's estimate of how much OS cache is available.
effective_cache_size = 24GB

# Memory per maintenance operation (VACUUM, CREATE INDEX, etc.)
maintenance_work_mem = 2GB

# Memory per query operation (sorts, hashes). Default is too low for analytics.
work_mem = 64MB

# =============================================================================
# CONNECTIONS
# =============================================================================

# Maximum concurrent connections. Node.js connection pools + PgBouncer.
# If you add PgBouncer later, lower this to 100 and let PgBouncer handle pooling.
max_connections = 200

# =============================================================================
# WAL (Write-Ahead Logging)
# =============================================================================

# WAL size for high-write workloads (PDS writes are bursty).
max_wal_size = 4GB
min_wal_size = 1GB

# Checkpoint completion target — spread checkpoint I/O over time.
checkpoint_completion_target = 0.9

# =============================================================================
# QUERY PLANNER
# =============================================================================

# Enable parallel queries for large aggregations (feed generation).
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_worker_processes = 8

# Cost settings for the query planner.
random_page_cost = 1.1        # SSD — much lower than default 4.0 (HDD assumption)
effective_io_concurrency = 200 # SSD can handle many concurrent I/O ops

# =============================================================================
# LOGGING
# =============================================================================

# Log slow queries (> 1 second) for performance analysis.
log_min_duration_statement = 1000
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# =============================================================================
# AUTOVACUUM
# =============================================================================

# More aggressive autovacuum for high-write tables (actor, follow, vote).
autovacuum_max_workers = 4
autovacuum_naptime = 10s
