<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="referrer" content="origin-when-cross-origin" />
    <!--
    Preconnect to essential domains
  -->
    <link rel="preconnect" href="https://paramx.social" />
    <title>{%- block head_title -%}PARA{%- endblock -%}</title>

    <!-- Hello Humans! API docs at https://atproto.com -->

    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="{{ staticCDNHost }}/static/media/InterVariable.c504db5c06caaf7cdfba.woff2"
      crossorigin />

    <style>
      /**
     * Minimum styles required to render splash.
     *
     * ALL OTHER STYLES BELONG IN `src/style.css`
     *
     * THIS NEEDS TO BE DUPLICATED IN `bskyweb/templates/base.html`
     */
      @font-face {
        font-family: 'InterVariable';
        src: url('{{ staticCDNHost }}/static/media/InterVariable.c504db5c06caaf7cdfba.woff2')
          format('woff2');
        font-weight: 300 1000;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'InterVariableItalic';
        src: url('{{ staticCDNHost }}/static/media/InterVariable-Italic.01dcbad1bac635f9c9cd.woff2')
          format('woff2');
        font-weight: 300 1000;
        font-style: italic;
        font-display: swap;
      }
      html,
      body {
        margin: 0px;
        padding: 0px;
        font-family:
          InterVariable,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          'Liberation Sans',
          Helvetica,
          Arial,
          sans-serif;
        text-rendering: optimizeLegibility;
        /* Platform-specific reset */
        -webkit-overflow-scrolling: touch;
        -webkit-text-size-adjust: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -ms-overflow-style: scrollbar;
        font-synthesis-weight: none;
      }
      :root {
        --text: black;
        --background: white;
        --backgroundLight: #e2e7ee;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --text: white;
          --background: black;
          --backgroundLight: #232e3e;
        }
      }

      html,
      body,
      #root {
        display: flex;
        flex: 1 0 auto;
        min-height: 100%;
        width: 100%;
      }
      html.theme--light,
      html.theme--light body,
      html.theme--light #root {
        background-color: white;
        --text: black;
        --background: white;
        --backgroundLight: #dce2ea;
      }
      html.theme--dark,
      html.theme--dark body,
      html.theme--dark #root {
        color-scheme: dark;
        background-color: black;
        --text: white;
        --background: black;
        --backgroundLight: #232e3e;
      }
      html.theme--dim,
      html.theme--dim body,
      html.theme--dim #root {
        color-scheme: dark;
        background-color: #151d28;
        --text: white;
        --background: #151d28;
        --backgroundLight: #2c3a4e;
      }

      #splash {
        display: flex;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        align-items: center;
        justify-content: center;
        background-color: var(--background);
      }

      #splash .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        top: -40px;
      }

      #splash .splash-logo {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 6px;
        margin-bottom: 16px;
      }

      #splash .splash-logo img {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }

      #splash .splash-logo-text {
        font-family: InterVariable, Georgia, 'Times New Roman', serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--text);
        padding-top: 2px;
      }

      #splash .splash-tagline {
        font-size: 14px;
        color: var(--text);
        opacity: 0.7;
        text-align: center;
        margin-bottom: 16px;
      }

      #splash .splash-loader {
        width: 140px;
        height: 2px;
        border-radius: 1px;
        overflow: hidden;
        background-color: var(--backgroundLight);
      }

      #splash .splash-loader-bar {
        width: 30%;
        height: 100%;
        border-radius: 1px;
        background-color: var(--text);
      }

      /**
     * We need these styles to prevent shifting due to scrollbar show/hide on
     * OSs that have them enabled by default. This also handles cases where the
     * screen wouldn't otherwise scroll, and therefore hide the scrollbar and
     * shift the content, by forcing the page to show a scrollbar.
     */
      body {
        width: 100%;
        overflow-y: scroll;
      }
    </style>
    <script>
      const theme = localStorage.getItem('ALF_THEME')
      if (theme) {
        document.documentElement.classList.add(`theme--${theme}`)
      }
    </script>

    {% include "scripts.html" %}
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{{ staticCDNHost }}/static/apple-touch-icon.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{{ staticCDNHost }}/static/favicon-32x32.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="{{ staticCDNHost }}/static/favicon-16x16.png" />
    <meta name="theme-color" />
    <meta name="application-name" content="PARA" />
    <meta name="generator" content="bskyweb" />
    <meta property="og:site_name" content="PARA" />
    <meta property="og:logo" content="{{ favicon }}" />
    <meta name="twitter:site" content="@paramxsocial" />
    <link type="application/activity+json" href="" />

    {% block html_head_extra -%}{%- endblock %}
  </head>

  <body>
    {%- block body_all %}
    <div id="root">
      <div id="splash">
        <div class="splash-content">
          <div class="splash-logo">
            <img src="{{ staticCDNHost }}/static/logo.png" alt="PARA" />
            <span class="splash-logo-text">PARA</span>
          </div>
          <div class="splash-tagline">Real people. Real conversations.</div>
          <div class="splash-loader">
            <div class="splash-loader-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <noscript>
      <h1 lang="en">JavaScript Required</h1>
      <p lang="en">
        This is a heavily interactive web application, and JavaScript is
        required. Simple HTML interfaces are possible, but that is not what this
        is.
      </p>

      <p lang="en">
        Learn more about PARA at
        <a href="https://paramx.social">paramx.social</a> and
        <a href="https://atproto.com">atproto.com</a>. {% block noscript_extra
        %}{% endblock %}
      </p></noscript
    >
    {% endblock -%}
  </body>
</html>
