<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/webp" href="/halloween_moover.webp"/>
    {% block meta %}{% endblock %}

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>PDS MOOver</title>
    <link rel="stylesheet" href="/style.css?new">
    <script src="https://unpkg.com/alpinejs" defer></script>


{{ layout_context.script_tags | safe }}

{% if let Some(hmr_script) = layout_context.vite_hmr_url %}
    {{hmr_script | safe}}
{% endif %}

</head>
<body>
<header class="navbar" role="banner" x-data="{ open: false }">
  <div class="navbar-inner">
    <a class="brand" href="/">PDS MOOver</a>
    <button class="navbar-toggle" @click="open = !open" :aria-expanded="open.toString()" aria-controls="primary-navigation" aria-label="Toggle navigation">

    </button>
    <nav id="primary-navigation" class="nav-links" :class="open ? 'open' : ''" aria-label="Primary" @click="open = false">
      <a href="/info" class="{% if layout_context.current_path == "/info" %}active{% endif %}">Info</a>
      <a href="/moover" class="{% if layout_context.current_path == "/moover" %}active{% endif %}">Moover</a>
      <a href="/missing-blobs" class="{% if layout_context.current_path == "/missing-blobs" %}active{% endif %}">Missing Blobs</a>
      <a href="/turn-off" class="{% if layout_context.current_path == "/turn-off" %}active{% endif %}">Turn Off</a>
      <a href="/backups" class="{% if layout_context.current_path == "/backups" %}active{% endif %}">Backups</a>
      <a href="/restore" class="{% if layout_context.current_path == "/restore" %}active{% endif %}">Restore</a>
      <a href="/terms" class="{% if layout_context.current_path == "/terms" %}active{% endif %}">Legal</a>

    </nav>
  </div>
</header>

<main class="page-content" role="main">
  {% block content %}{% endblock %}
</main>
</body>
</html>
